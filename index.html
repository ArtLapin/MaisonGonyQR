      font-size: 17px; font-weight: 400; padding: 14px 16px;

        addressLabel: '地址',
        hoursLabel: '营业时间',
        hoursValue: '11:30–18:00（周四休息）',
        phoneLabel: '电话',
        parkingLabel: '停车',
        parkingValue: '店前1个车位 · 附近公共停车场',
        naverBtn: 'Naver 地图',
        googleBtn: 'Google 地图',
        phHero: '临时图片',
        phImage: '图片准备中',
        phStore: '店铺照片准备中'
      }
    };

    /* =====================================================================
       이 아래는 동작 코드입니다 (수정 불필요)
       ===================================================================== */
    function $(id) { return document.getElementById(id); }

    function setHref(id, url) {
      var el = $(id);
      if (!el) return;
      if (url) { el.href = url; }
      else { el.style.display = 'none'; }   // 링크 없으면 버튼 숨김
    }

    function setImage(id, src, alt) {
      var el = $(id);
      if (!el || !src) return;              // 이미지 없으면 플레이스홀더 유지
      var ph = el.innerHTML;                // 플레이스홀더 백업 (로드 실패 시 복원)
      el.innerHTML = '';
      el.classList.add('filled');
      var img = document.createElement('img');
      img.src = src; img.alt = alt || ''; img.loading = 'lazy';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover';
      img.onerror = function () { el.classList.remove('filled'); el.innerHTML = ph; };
      el.appendChild(img);
    }

    function applyConfig() {
      setHref('link-home', CONFIG.links.shop);
      setHref('link-shop', CONFIG.links.shop);
      setHref('link-instagram', CONFIG.links.instagram);
      setHref('link-naver', CONFIG.links.naverMap);
      setHref('link-google', CONFIG.links.googleMap);

      var ph = $('v-phone');
      if (ph) {
        if (CONFIG.contact.phone) {
          ph.textContent = CONFIG.contact.phone;
          ph.href = 'tel:' + CONFIG.contact.phone.replace(/[^0-9+]/g, '');
        } else {
          var r = $('row-phone'); if (r) r.style.display = 'none';
        }
      }

      setImage('hero-media', CONFIG.images.hero, 'Maison Gony');
      if (CONFIG.images.hero) { var t = $('hero-tag'); if (t) t.style.display = 'none'; }
      setImage('store-media', CONFIG.images.store, 'Maison Gony store');
      (CONFIG.images.products || []).forEach(function (src, i) { setImage('p-media-' + i, src, ''); });

      $('year').textContent = new Date().getFullYear();
    }

    function setLang(lang) {
      if (!I18N[lang]) lang = 'en';
      var d = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var k = el.getAttribute('data-i18n');
        if (d[k] == null) return;
        if (k === 'heroHook') { el.innerHTML = d[k].split('\n').join('<br>'); }
        else { el.textContent = d[k]; }
      });
      var addr = $('v-address'); if (addr) addr.textContent = CONFIG.contact.address;
      document.querySelectorAll('.lang-btn').forEach(function (b) {
        var on = b.getAttribute('data-lang') === lang;
        b.classList.toggle('is-active', on);
        b.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      try { localStorage.setItem('mg-lang', lang); } catch (e) {}
    }

    function detectLang() {
      try { var s = localStorage.getItem('mg-lang'); if (s && I18N[s]) return s; } catch (e) {}
      var n = (navigator.language || 'en').toLowerCase();
      if (n.indexOf('ko') === 0) return 'ko';
      if (n.indexOf('zh') === 0) return 'zh';
      return 'en';
    }

    function initGA() {
      var id = CONFIG.GA_ID;
      if (!id || id.indexOf('G-') !== 0 || id === 'G-XXXXXXXXXX') return;
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { dataLayer.push(arguments); };
      gtag('js', new Date());
      gtag('config', id);
    }

    applyConfig();
    setLang(detectLang());
    document.querySelectorAll('.lang-btn').forEach(function (b) {
      b.addEventListener('click', function () { setLang(b.getAttribute('data-lang')); });
    });
    initGA();
  </script>
</body>
</html>
